<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Tic Tac Toe</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Main game container -->
  <div class="game-container">
    <!-- Header / Title -->
    <header class="game-header">
      <h1 class="game-title">✦ TIC TAC TOE ✦</h1>
      <p class="game-subtitle">Neon Edition</p>
    </header>

    <!-- Scoreboard -->
    <section class="scoreboard" aria-label="Scoreboard">
      <div class="score-card score-x">
        <span class="score-label">X</span>
        <span class="score-value" id="scoreX">0</span>
      </div>
      <div class="score-card score-draw">
        <span class="score-label">Draw</span>
        <span class="score-value" id="scoreDraw">0</span>
      </div>
      <div class="score-card score-o">
        <span class="score-label">O</span>
        <span class="score-value" id="scoreO">0</span>
      </div>
    </section>

    <!-- Turn indicator -->
    <div class="turn-indicator" id="turnIndicator">
      <span class="turn-text">Current Turn:</span>
      <span class="turn-badge" id="turnBadge">X</span>
    </div>

    <!-- Game board -->
    <section class="board" id="board" aria-label="Tic Tac Toe board">
      <!-- 9 cells will be generated by JavaScript -->
    </section>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn btn-restart" id="btnRestart" type="button">
        ↻ New Game
      </button>
      <button class="btn btn-reset" id="btnResetScores" type="button">
        Reset Scores
      </button>
    </div>

    <!-- Footer -->
    <footer class="game-footer">
      <p>✦ Click any cell to place your mark ✦</p>
    </footer>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-content" id="overlayContent">
      <div class="overlay-icon" id="overlayIcon">🏆</div>
      <h2 class="overlay-title" id="overlayTitle">Game Over</h2>
      <p class="overlay-message" id="overlayMessage">X Wins!</p>
      <button class="btn btn-play-again" id="btnPlayAgain" type="button">
        ▶ Play Again
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
